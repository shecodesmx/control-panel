<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Glowing Controls</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Control Panel</h1>
        <p class="subtitle">Select your settings</p>
        
        <div class="checkbox-grid">
            <div class="checkbox-wrapper">
                <input type="checkbox" id="notifications">
                <label for="notifications" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                        </svg>
                        <span class="icon-label">Alerts</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="camera">
                <label for="camera" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 15c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm0-8c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm0-3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9z"/>
                        </svg>
                        <span class="icon-label">Camera</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="location">
                <label for="location" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                        <span class="icon-label">GPS</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="security">
                <label for="security" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                        </svg>
                        <span class="icon-label">Shield</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="bluetooth">
                <label for="bluetooth" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/>
                        </svg>
                        <span class="icon-label">Sync</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="battery">
                <label for="battery" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/>
                        </svg>
                        <span class="icon-label">Power</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="download">
                <label for="download" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2z"/>
                        </svg>
                        <span class="icon-label">Save</span>
                    </div>
                </label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="settings">
                <label for="settings" class="icon">
                    <div class="icon-content">
                        <svg viewBox="0 0 24 24">
                            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                        </svg>
                        <span class="icon-label">Config</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="counter">
            <span class="counter-text">Activated: </span>
            <span class="counter-number" id="counter">0</span>
            <span class="counter-text"> / 8</span>
        </div>

        <div>
            <button class="reset-btn" onclick="resetAll()">Reset All</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
